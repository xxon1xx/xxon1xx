<script>
// ─── AUDIO ENGINE — LAYERED AMBIENT / DATA DRONE ─────────────────────────────
// Architecture: capas entran escalonadas cada ~15-25s durante los primeros ~3min
// Layer 1 (0s):   Sub-drone 40hz + pad chord shimmer (fundamental)
// Layer 2 (5s):  Noise textural filtrado (respiración)
// Layer 3 (15s):  Data pulses — clicks TCP irregulares
// Layer 4 (52s):  Pad chord mid (3 osciladores detuneados — "shimmer")
// Layer 5 (80s):  Sweep scan high freq
// Layer 6 (110s): Melodic data tones (pentatónica fría)
// Layer 7 (145s): Glitch bursts — fragmentos cortos de ruido estéril
// Layer 8 (180s): Resonant bell tones — muy suaves, espaciados

let audioCtx, masterGain, noiseGain, noiseMotionTarget = 0.022;
let audioReady = false;

function initAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  // Limiter al final de la cadena — evita clipping sin importar cuántas capas sumen
  const limiter = audioCtx.createDynamicsCompressor();
  limiter.threshold.value = -6;
  limiter.knee.value = 3;
  limiter.ratio.value = 20;
  limiter.attack.value = 0.001;
  limiter.release.value = 0.1;
  limiter.connect(audioCtx.destination);

  masterGain = audioCtx.createGain();
  masterGain.gain.setValueAtTime(0, audioCtx.currentTime);
  masterGain.gain.linearRampToValueAtTime(0.55, audioCtx.currentTime + 1.5);
  masterGain.connect(limiter);


  // ── VOCAL PAD (4s): voz robótica etérea — pad de fondo muy tenue ─────────
  // Técnica: noise filtrado con formantes de vocales (F1/F2) + vibrato lento
  // Suena como una voz humana procesada hasta casi desaparecer
  spawnLayer(4, () => {
    const vocalGain = audioCtx.createGain();
    vocalGain.gain.setValueAtTime(0, audioCtx.currentTime);
    vocalGain.gain.linearRampToValueAtTime(0.038, audioCtx.currentTime + 12);
    vocalGain.connect(masterGain);

    // ── Fuente: ruido + tono de glotis ──────────────────────────────────────
    // El ruido simula el tracto vocal, el tono la cuerda vocal
    const nBufSize = audioCtx.sampleRate * 3;
    const nBuf = audioCtx.createBuffer(1, nBufSize, audioCtx.sampleRate);
    const nData = nBuf.getChannelData(0);
    for (let i = 0; i < nBufSize; i++) nData[i] = Math.random() * 2 - 1;
    const nSrc = audioCtx.createBufferSource();
    nSrc.buffer = nBuf; nSrc.loop = true;

    // Fundamental de glotis — pitch de "voz" robótica: 90hz muy suave
    const glottis = audioCtx.createOscillator();
    glottis.type = 'sawtooth'; // armónicos ricos como voz real
    glottis.frequency.value = 90;
    const glottisGain = audioCtx.createGain();
    glottisGain.gain.value = 0.3; // mezcla relativa con noise

    // ── Vibrato en el pitch — da el carácter "fantasma" ────────────────────
    const vibrato = audioCtx.createOscillator();
    const vibratoDepth = audioCtx.createGain();
    vibrato.frequency.value = 0.18; // muy lento — casi un tremolo
    vibratoDepth.gain.value = 3.5;  // ±3.5hz de variación de pitch
    vibrato.connect(vibratoDepth);
    vibratoDepth.connect(glottis.frequency);
    vibrato.start(audioCtx.currentTime);

    // ── Formantes de vocal: cadena de filtros peaking/bandpass ──────────────
    // Morfología de formantes que rota lentamente entre vocales
    // "a": F1=800 F2=1200  "e": F1=400 F2=2300  "o": F1=500 F2=900
    // Usamos 3 bandpass + 1 peaking para emular el tracto vocal
    const f1 = audioCtx.createBiquadFilter(); // formante 1
    f1.type = 'peaking'; f1.frequency.value = 600; f1.Q.value = 4; f1.gain.value = 14;

    const f2 = audioCtx.createBiquadFilter(); // formante 2
    f2.type = 'peaking'; f2.frequency.value = 1400; f2.Q.value = 5; f2.gain.value = 10;

    const f3 = audioCtx.createBiquadFilter(); // formante 3 — brillo
    f3.type = 'peaking'; f3.frequency.value = 2800; f3.Q.value = 6; f3.gain.value = 7;

    const bodyHp = audioCtx.createBiquadFilter(); // elimina sub-graves de la voz
    bodyHp.type = 'highpass'; bodyHp.frequency.value = 180;

    const bodyLp = audioCtx.createBiquadFilter(); // techo suave
    bodyLp.type = 'lowpass'; bodyLp.frequency.value = 4200;

    // Mezcla glotis + noise → filtros de formantes → vocalGain
    const preMix = audioCtx.createGain(); preMix.gain.value = 1;
    glottis.connect(glottisGain); glottisGain.connect(preMix);
    nSrc.connect(preMix);
    preMix.connect(bodyHp); bodyHp.connect(f1); f1.connect(f2); f2.connect(f3);
    f3.connect(bodyLp); bodyLp.connect(vocalGain);

    glottis.start(audioCtx.currentTime);
    nSrc.start();
    vibrato.start(audioCtx.currentTime);

    // ── Morphing lento de formantes — la "voz" muta entre vocales ───────────
    // Cada 8-18s cambia suavemente la frecuencia de F1 y F2
    const vowels = [
      { f1: 800,  f2: 1200 }, // "a"
      { f1: 400,  f2: 2300 }, // "e"
      { f1: 500,  f2: 900  }, // "o"
      { f1: 350,  f2: 1900 }, // "i" procesada
      { f1: 650,  f2: 1080 }, // "u" oscura
    ];
    let vowelIdx = 0;
    function morphVowel() {
      vowelIdx = (vowelIdx + 1) % vowels.length;
      const v = vowels[vowelIdx];
      const t = audioCtx.currentTime;
      const morphTime = 4 + Math.random() * 5; // transición lenta
      f1.frequency.setValueAtTime(f1.frequency.value, t);
      f1.frequency.linearRampToValueAtTime(v.f1, t + morphTime);
      f2.frequency.setValueAtTime(f2.frequency.value, t);
      f2.frequency.linearRampToValueAtTime(v.f2, t + morphTime);
      setTimeout(morphVowel, (8 + Math.random() * 12) * 1000);
    }
    setTimeout(morphVowel, 6000);

    // ── Tremolo muy lento sobre el vocalGain — "respiración" de la voz ──────
    const tremolo = audioCtx.createOscillator();
    const tremoloDepth = audioCtx.createGain();
    tremolo.frequency.value = 0.06; // ciclo ~16s — casi imperceptible
    tremoloDepth.gain.value = 0.012; // ±1.2% de variación
    tremolo.connect(tremoloDepth);
    tremoloDepth.connect(vocalGain.gain);
    tremolo.start(audioCtx.currentTime);
  });

  // ── LAYER 1 (0s): Sub-bass drone — 40hz felt ────────────────────────────
  // Amplitudes reducidas para no saturar el master desde el inicio
  spawnLayer(0, () => {
    addDetuneCluster(40, [0, 1.1, -0.8], [0.12, 0.06, 0.04], 'sine', 0, 6);
  });

  // ── LAYER 2 (8s): Ruido textural — respiración del sistema ──────────────
  spawnLayer(2, () => {
    const bufSize = audioCtx.sampleRate * 4;
    const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) d[i] = Math.random() * 2 - 1;
    const src = audioCtx.createBufferSource();
    src.buffer = buf; src.loop = true;

    const lp = audioCtx.createBiquadFilter();
    lp.type = 'lowpass'; lp.frequency.value = 300; lp.Q.value = 0.8;
    const hp = audioCtx.createBiquadFilter();
    hp.type = 'highpass'; hp.frequency.value = 90;

    noiseGain = audioCtx.createGain();
    noiseGain.gain.setValueAtTime(0, audioCtx.currentTime);
    noiseGain.gain.linearRampToValueAtTime(0.018, audioCtx.currentTime + 5);

    src.connect(lp); lp.connect(hp); hp.connect(noiseGain);
    noiseGain.connect(masterGain);
    src.start();

    // Capa de aire alto — muy sutil
    const buf2 = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
    const d2 = buf2.getChannelData(0);
    for (let i = 0; i < bufSize; i++) d2[i] = Math.random() * 2 - 1;
    const src2 = audioCtx.createBufferSource();
    src2.buffer = buf2; src2.loop = true;
    const hp2 = audioCtx.createBiquadFilter();
    hp2.type = 'highpass'; hp2.frequency.value = 9500;
    const airGain = audioCtx.createGain();
    airGain.gain.setValueAtTime(0, audioCtx.currentTime);
    airGain.gain.linearRampToValueAtTime(0.008, audioCtx.currentTime + 7);
    src2.connect(hp2); hp2.connect(airGain); airGain.connect(masterGain);
    src2.start();
  });

  // ── LAYER 3 (20s): Data pulse train — TCP bursts ────────────────────────
  spawnLayer(8, () => {
    const intervals = [0.13, 0.26, 0.13, 0.52, 0.13, 0.13, 0.26, 1.04, 0.13, 0.26, 0.39];
    let t = audioCtx.currentTime + 0.1;
    const freqs = [1000, 2000, 1500, 750];

    function schedBatch() {
      // Re-anclar t al presente para evitar que se dispare en el pasado
      t = Math.max(t, audioCtx.currentTime + 0.05);
      for (let i = 0; i < 32; i++) {
        t += intervals[Math.floor(Math.random() * intervals.length)];
        const osc = audioCtx.createOscillator();
        const env = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freqs[Math.floor(Math.random() * freqs.length)];
        env.gain.setValueAtTime(0, t);
        env.gain.linearRampToValueAtTime(0.04, t + 0.003);
        env.gain.linearRampToValueAtTime(0, t + 0.022);
        osc.connect(env); env.connect(masterGain);
        osc.start(t); osc.stop(t + 0.03);
      }
      setTimeout(schedBatch, 4000 + Math.random() * 2000);
    }
    schedBatch();
  });

  // ── LAYER 4 (35s): Pad chord shimmer ────────────────────────────────────
  spawnLayer(6, () => {
    addDetuneCluster(110, [0,  0.9, -0.7], [0.055, 0.035, 0.028], 'sine',     0,  12);
    addDetuneCluster(165, [0,  1.2, -1.0], [0.038, 0.024, 0.018], 'sine',     3,  14);
    addDetuneCluster(194, [0, -0.8,  1.1], [0.025, 0.016, 0.012], 'sine',     6,  14);
    addDetuneCluster(330, [0,  0.5],       [0.012, 0.008],         'triangle', 8,  16);
  });

  // ── LAYER 5 (55s): Sweep scan high freq ─────────────────────────────────
  spawnLayer(22, () => {
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = 'sine';
    g.gain.setValueAtTime(0, audioCtx.currentTime);
    g.gain.linearRampToValueAtTime(0.006, audioCtx.currentTime + 3);
    function sweep() {
      const t = audioCtx.currentTime;
      osc.frequency.setValueAtTime(11000, t);
      osc.frequency.linearRampToValueAtTime(17000, t + 11);
      osc.frequency.linearRampToValueAtTime(11000, t + 22);
      setTimeout(sweep, 22000);
    }
    sweep();
    osc.connect(g); g.connect(masterGain);
    osc.start(audioCtx.currentTime);
  });

  // ── LAYER 6 (75s): Melodic data tones — pentatónica menor ───────────────
  spawnLayer(35, () => {
    const scale = [220, 261.6, 311.1, 369.9, 415.3, 440, 523.3];
    function spawnTone() {
      const freq = scale[Math.floor(Math.random() * scale.length)];
      const t = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const env = audioCtx.createGain();
      osc.type = Math.random() > 0.6 ? 'sine' : 'triangle';
      osc.frequency.value = freq;
      const dur = 1.4 + Math.random() * 2.8;
      env.gain.setValueAtTime(0, t);
      env.gain.linearRampToValueAtTime(0.028 + Math.random() * 0.016, t + 0.08);
      env.gain.setTargetAtTime(0, t + dur * 0.6, dur * 0.35);
      osc.connect(env); env.connect(masterGain);
      osc.start(t); osc.stop(t + dur + 1);
      osc.onended = () => { try { osc.disconnect(); env.disconnect(); } catch(e){} };
      setTimeout(spawnTone, 800 + Math.random() * 2800);
    }
    spawnTone();
  });

  // ── LAYER 7 (50s): Digital scanner — sweep de frecuencia filtrado ────────
  spawnLayer(20, () => {
    function scannerSweep() {
      const t = audioCtx.currentTime + 0.01; // pequeño offset para evitar click
      const osc = audioCtx.createOscillator();
      const filter = audioCtx.createBiquadFilter();
      const gain = audioCtx.createGain();

      osc.type = 'square';
      filter.type = 'bandpass';
      filter.frequency.value = 3000 + Math.random() * 4000;
      filter.Q.value = 14;

      const startFreq = 400 + Math.random() * 1000;
      const endFreq = 6000 + Math.random() * 5000;
      const dur = 0.12 + Math.random() * 0.22;

      osc.frequency.setValueAtTime(startFreq, t);
      osc.frequency.exponentialRampToValueAtTime(endFreq, t + dur);

      // Envelope con fade-in mínimo para evitar click
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.014, t + 0.008);
      gain.gain.exponentialRampToValueAtTime(0.0001, t + dur + 0.02);

      osc.connect(filter);
      filter.connect(gain);
      gain.connect(masterGain);

      osc.start(t);
      osc.stop(t + dur + 0.05);
      osc.onended = () => { try { osc.disconnect(); filter.disconnect(); gain.disconnect(); } catch(e){} };

      setTimeout(scannerSweep, 500 + Math.random() * 2000);
    }
    scannerSweep();
  });

  // ── LAYER 8 (95s): Glitch bursts — micro fragmentos ─────────────────────
  spawnLayer(40, () => {
    function glitchBurst() {
      const count = 2 + Math.floor(Math.random() * 4);
      let t = audioCtx.currentTime + 0.01;
      for (let i = 0; i < count; i++) {
        t += 0.025 + Math.random() * 0.08;
        const bufSize = Math.floor(audioCtx.sampleRate * 0.035);
        const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
        const d = buf.getChannelData(0);
        // Fade in/out en el buffer para evitar clicks
        for (let j = 0; j < bufSize; j++) {
          const env = Math.sin((j / bufSize) * Math.PI);
          d[j] = (Math.random() * 2 - 1) * env;
        }
        const src = audioCtx.createBufferSource();
        src.buffer = buf;
        const bp = audioCtx.createBiquadFilter();
        bp.type = 'bandpass';
        bp.frequency.value = 1200 + Math.random() * 2500;
        bp.Q.value = 10;
        const g = audioCtx.createGain();
        g.gain.value = 0.035 + Math.random() * 0.045;
        src.connect(bp); bp.connect(g); g.connect(masterGain);
        src.start(t);
        src.onended = () => { try { src.disconnect(); bp.disconnect(); g.disconnect(); } catch(e){} };
      }
      setTimeout(glitchBurst, 3000 + Math.random() * 6000);
    }
    glitchBurst();
  });

  // ── LAYER 9 (120s): Bell tones cristalinos ───────────────────────────────
  spawnLayer(25, () => {
    const bells = [523.3, 659.3, 783.9, 1046.5, 1318.5];
    function spawnBell() {
      const freq = bells[Math.floor(Math.random() * bells.length)];
      const t = audioCtx.currentTime;
      [[freq, 0.022], [freq * 2.756, 0.009], [freq * 5.404, 0.004]].forEach(([f, amp]) => {
        const osc = audioCtx.createOscillator();
        const env = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = f;
        const decay = 2.0 + Math.random() * 1.6;
        env.gain.setValueAtTime(0, t);
        env.gain.linearRampToValueAtTime(amp, t + 0.005);
        env.gain.exponentialRampToValueAtTime(0.0001, t + decay);
        osc.connect(env); env.connect(masterGain);
        osc.start(t); osc.stop(t + decay + 0.1);
        osc.onended = () => { try { osc.disconnect(); env.disconnect(); } catch(e){} };
      });
      setTimeout(spawnBell, 5000 + Math.random() * 9000);
    }
    spawnBell();
  });

  // ── MACHINE A (10s): Mechanical thump — golpes de maquinaria pesada ────────
  // Sub-clicks rítmicos irregulares, como pistones o relés industriales
  spawnLayer(10, () => {
    function thump() {
      const t = audioCtx.currentTime + 0.01;

      // Cuerpo del golpe — sine muy corto con pitch decay (drum synthesis)
      const body = audioCtx.createOscillator();
      const bodyEnv = audioCtx.createGain();
      body.type = 'sine';
      body.frequency.setValueAtTime(90 + Math.random() * 40, t);
      body.frequency.exponentialRampToValueAtTime(28, t + 0.08);
      bodyEnv.gain.setValueAtTime(0.0001, t);
      bodyEnv.gain.linearRampToValueAtTime(0.18, t + 0.003);
      bodyEnv.gain.exponentialRampToValueAtTime(0.0001, t + 0.12);
      body.connect(bodyEnv); bodyEnv.connect(masterGain);
      body.start(t); body.stop(t + 0.14);

      // Transiente de impacto — noise burst muy corto
      const nSize = Math.floor(audioCtx.sampleRate * 0.015);
      const nBuf = audioCtx.createBuffer(1, nSize, audioCtx.sampleRate);
      const nData = nBuf.getChannelData(0);
      for (let i = 0; i < nSize; i++) nData[i] = (Math.random() * 2 - 1) * (1 - i / nSize);
      const nSrc = audioCtx.createBufferSource();
      nSrc.buffer = nBuf;
      const nGain = audioCtx.createGain();
      nGain.gain.value = 0.09;
      nSrc.connect(nGain); nGain.connect(masterGain);
      nSrc.start(t);

      // Ritmo irregular: a veces doble golpe, a veces espera larga
      const next = Math.random() < 0.2
        ? 80 + Math.random() * 120          // doble rápido
        : 1200 + Math.random() * 3800;      // pausa industrial
      setTimeout(thump, next);
    }
    thump();
  });

  // ── MACHINE B (25s): Servo whine — motores eléctricos ───────────────────
  // Tono de alta frecuencia que varía como un servo buscando posición
  spawnLayer(25, () => {
    function servoWhine() {
      const t = audioCtx.currentTime + 0.01;
      const dur = 0.4 + Math.random() * 1.8;
      const osc = audioCtx.createOscillator();
      const env = audioCtx.createGain();
      const filt = audioCtx.createBiquadFilter();

      osc.type = 'sawtooth';
      filt.type = 'bandpass';
      filt.Q.value = 22;

      // Frecuencia base del servo: rango 2k-6kHz
      const baseF = 2000 + Math.random() * 4000;
      filt.frequency.value = baseF;

      // El servo "busca" — frecuencia que sube, rebota, se estabiliza
      osc.frequency.setValueAtTime(baseF * 0.8, t);
      osc.frequency.linearRampToValueAtTime(baseF * 1.15, t + dur * 0.4);
      osc.frequency.linearRampToValueAtTime(baseF * 0.95, t + dur * 0.7);
      osc.frequency.linearRampToValueAtTime(baseF, t + dur);

      env.gain.setValueAtTime(0, t);
      env.gain.linearRampToValueAtTime(0.022, t + 0.02);
      env.gain.setValueAtTime(0.022, t + dur - 0.04);
      env.gain.linearRampToValueAtTime(0, t + dur);

      osc.connect(filt); filt.connect(env); env.connect(masterGain);
      osc.start(t); osc.stop(t + dur + 0.05);
      osc.onended = () => { try { osc.disconnect(); filt.disconnect(); env.disconnect(); } catch(e){} };

      setTimeout(servoWhine, 1500 + Math.random() * 5000);
    }
    servoWhine();
  });

  // ── MACHINE C (42s): Cooling fan — ventilador de banda angosta ───────────
  // Ruido de banda muy estrecha, como un fan de servidor que acelera/desacelera
  spawnLayer(42, () => {
    // Simula fan con noise filtrado + modulación lenta de frecuencia del filtro
    const bufSize = audioCtx.sampleRate * 3;
    const fanBuf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
    const fanData = fanBuf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) fanData[i] = Math.random() * 2 - 1;

    const fanSrc = audioCtx.createBufferSource();
    fanSrc.buffer = fanBuf;
    fanSrc.loop = true;

    // Dos filtros en serie para banda muy estrecha
    const bp1 = audioCtx.createBiquadFilter();
    bp1.type = 'bandpass';
    bp1.frequency.value = 3200;
    bp1.Q.value = 30;

    const bp2 = audioCtx.createBiquadFilter();
    bp2.type = 'bandpass';
    bp2.frequency.value = 3200;
    bp2.Q.value = 30;

    const fanGain = audioCtx.createGain();
    fanGain.gain.setValueAtTime(0, audioCtx.currentTime);
    fanGain.gain.linearRampToValueAtTime(0.055, audioCtx.currentTime + 8);

    fanSrc.connect(bp1); bp1.connect(bp2); bp2.connect(fanGain);
    fanGain.connect(masterGain);
    fanSrc.start();

    // LFO sobre la frecuencia del filtro — simula fluctuación de RPM
    const fanLfo = audioCtx.createOscillator();
    const fanLfoDepth = audioCtx.createGain();
    fanLfo.type = 'sine';

  // ── MACHINE D (65s): Relay clicks — contactores eléctricos ──────────────
  // Clicks metálicos secos, como relés o disyuntores activándose
  spawnLayer(65, () => {
    function relayClick() {
      const t = audioCtx.currentTime + 0.01;

      // Click metálico = noise burst muy corto + resonancia metálica
      const cSize = Math.floor(audioCtx.sampleRate * 0.006);
      const cBuf = audioCtx.createBuffer(1, cSize, audioCtx.sampleRate);
      const cData = cBuf.getChannelData(0);
      for (let i = 0; i < cSize; i++) cData[i] = (Math.random() * 2 - 1) * (1 - i / cSize);
      const cSrc = audioCtx.createBufferSource();
      cSrc.buffer = cBuf;

      // Highpass para que sea seco y metálico, no suave
      const hp = audioCtx.createBiquadFilter();
      hp.type = 'highpass';
      hp.frequency.value = 3000;

      const cGain = audioCtx.createGain();
      cGain.gain.value = 0.12;

      cSrc.connect(hp); hp.connect(cGain); cGain.connect(masterGain);
      cSrc.start(t);

      // Resonancia metálica post-click — como la carcasa vibrando
      const res = audioCtx.createOscillator();
      const resEnv = audioCtx.createGain();
      res.type = 'sine';
      res.frequency.value = 4000 + Math.random() * 3000;
      resEnv.gain.setValueAtTime(0.0001, t + 0.002);
      resEnv.gain.linearRampToValueAtTime(0.018, t + 0.005);
      resEnv.gain.exponentialRampToValueAtTime(0.0001, t + 0.08);
      res.connect(resEnv); resEnv.connect(masterGain);
      res.start(t + 0.002); res.stop(t + 0.1);

      // A veces dispara en ráfaga rápida (como máquina iniciando secuencia)
      if (Math.random() < 0.25) {
        const extraClicks = 2 + Math.floor(Math.random() * 4);
        for (let k = 1; k <= extraClicks; k++) {
          setTimeout(() => relayClickSingle(), k * (30 + Math.random() * 80));
        }
      }

      setTimeout(relayClick, 800 + Math.random() * 4500);
    }

    // Versión simple sin ráfaga — para los clicks extra de la ráfaga
    function relayClickSingle() {
      const t = audioCtx.currentTime + 0.005;
      const cSize = Math.floor(audioCtx.sampleRate * 0.005);
      const cBuf = audioCtx.createBuffer(1, cSize, audioCtx.sampleRate);

  // MACHINE E (15s): HDD seek
  spawnLayer(15, () => {
    function hddSeek() {
      const t = audioCtx.currentTime + 0.008;
      const seekCount = 1 + Math.floor(Math.random() * 5);
      let st = t;

        const dir = Math.random() > 0.5 ? 1 : -1;

        env.gain.setValueAtTime(0, st);
        env.gain.linearRampToValueAtTime(0.055, st + 0.003);
        env.gain.exponentialRampToValueAtTime(0.0001, st + dur);
        osc.connect(filt); filt.connect(env); env.connect(masterGain);
        osc.start(st); osc.stop(st + dur + 0.01);
        osc.onended = () => { try { osc.disconnect(); filt.disconnect(); env.disconnect(); } catch(e){} };

  // MACHINE F (30s): CPU hum - armónicos de 60hz como fuente de poder
  spawnLayer(12, () => {

  // MACHINE G (18s): Bit crusher - audio colapsando a baja resolución
  spawnLayer(7, () => {
    function bitCrush() {
      const t = audioCtx.currentTime + 0.008;
      const dur = 0.08 + Math.random() * 0.35;
      const bufSize = Math.floor(audioCtx.sampleRate * dur);
      const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
      const data = buf.getChannelData(0);
      const bits = 2 + Math.floor(Math.random() * 3);
      const levels = Math.pow(2, bits);
      const baseFreq = 200 + Math.random() * 600;
      for (let i = 0; i < bufSize; i++) {
        const raw = Math.sin(2 * Math.PI * baseFreq * i / audioCtx.sampleRate);
        data[i] = Math.round(raw * levels) / levels;
      }
      const src = audioCtx.createBufferSource();
      src.buffer = buf;
      src.playbackRate.value = 0.25 + Math.random() * 0.5;
      const env = audioCtx.createGain();
      env.gain.setValueAtTime(0, t);
      env.gain.linearRampToValueAtTime(0.05, t + 0.01);

      const hp = audioCtx.createBiquadFilter();

  // MACHINE H (45s): Modem handshake - negociación 56k analógica

          osc.connect(env); env.connect(masterGain);

  // MACHINE I (55s): RAM bus noise - transferencia de bloques de memoria
  spawnLayer(55, () => {
    function ramBurst() {
      // Genera una ráfaga de N pulsos en secuencia, sin recursión
      const burstCount = 1 + Math.floor(Math.random() * 6);
      const dur = 0.012 + Math.random() * 0.055;
      for (let b = 0; b < burstCount; b++) {
        const t = audioCtx.currentTime + 0.008 + b * (dur + 0.006);
        const bufSize = Math.floor(audioCtx.sampleRate * dur);
        const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < bufSize; i++) {
          data[i] = (Math.random() > 0.5 ? 1 : -1) * Math.sin(i / bufSize * Math.PI);
        }
        const src = audioCtx.createBufferSource();
        src.buffer = buf;
        const hp = audioCtx.createBiquadFilter();
        hp.type = 'highpass'; hp.frequency.value = 7000;

        // Desconectar después de reproducir — libera el nodo del grafo
        src.onended = () => { try { src.disconnect(); hp.disconnect(); g.disconnect(); } catch(e){} };
      }
      // Un solo setTimeout por ciclo, con delay mínimo seguro
      setTimeout(ramBurst, 600 + Math.random() * 3000);

    ramBurst();

  spawnLayer(30, () => {

// Spawna una capa después de `delaySec` segundos
function spawnLayer(delaySec, fn) {
  setTimeout(fn, delaySec * 1000);
}

// Cluster de osciladores detuneados con LFO de amplitud correcto
// FIX: el LFO se enruta a través de un GainNode intermediario conectado al AudioParam
function addDetuneCluster(baseFreq, detunes, amps, type, delay, fadeIn) {
  detunes.forEach((dt, i) => {
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = baseFreq + dt;

    const startT = audioCtx.currentTime + delay;
    g.gain.setValueAtTime(0, startT);
    g.gain.linearRampToValueAtTime(amps[i], startT + fadeIn);

    // LFO correcto: osc → gainNode (como modulador) → AudioParam.value
    // Se usa un ConstantSourceNode como base + LFO para modular el gain
    const lfo = audioCtx.createOscillator();
    const lfoDepth = audioCtx.createGain();
    lfo.frequency.value = 0.06 + Math.random() * 0.05;
    lfoDepth.gain.value = amps[i] * 0.15; // profundidad del LFO = 15% del amp

    // La modulación suma al AudioParam — esto es correcto en Web Audio
    lfo.connect(lfoDepth);
    lfoDepth.connect(g.gain); // conectar GainNode al AudioParam es válido

    lfo.start(startT);
    osc.connect(g); g.connect(masterGain);
    osc.start(startT);
  });
}

function updateAudioMotion(motion) {
  if (!audioCtx || !noiseGain) return;
  noiseGain.gain.setTargetAtTime(
    0.016 + motion * 0.055,
    audioCtx.currentTime, 0.4
  );
}

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  fontSize = Math.max(13, Math.min(17, W / 38));
  cw = fontSize * 0.62;
  cols = Math.floor(W / cw);
  rows = Math.floor(H / fontSize) + 1;
  sampleCanvas.width = sampleW;
  sampleCanvas.height = sampleH;
  buildGrid();
}

function randChar() { return CHARS[Math.floor(Math.random() * CHARS.length)]; }
function randBright() { return BRIGHT_CHARS[Math.floor(Math.random() * BRIGHT_CHARS.length)]; }

function buildGrid() {
  cells = [];
  for (let r = 0; r < rows; r++) {
    cells[r] = [];
    for (let c = 0; c < cols; c++) {
      cells[r][c] = { ch: randChar(), timer: Math.random() * 20 };
    }
  }
  activePhrases = [];
}

function sampleVideo() {
  if (!cameraActive || video.readyState < 2) return null;
  sampleCtx.drawImage(video, 0, 0, sampleW, sampleH);
  return sampleCtx.getImageData(0, 0, sampleW, sampleH).data;
}

function getPixelBrightness(r, c) {
  if (!pixelData) return 0;
  const px = Math.floor((c / cols) * sampleW);
  const py = Math.floor((r / rows) * sampleH);
  const mirroredPx = sampleW - 1 - px;
  const idx = (py * sampleW + mirroredPx) * 4;
  let luma = pixelData[idx] * 0.299 + pixelData[idx+1] * 0.587 + pixelData[idx+2] * 0.114;
  luma = (luma - 128) * 1.8 + 128;
  return Math.max(0, Math.min(255, luma)) / 255;
}

function detectMotion(frame) {
  let diff = 0;
  if (prevFrame && frame) {
    for (let i = 0; i < frame.length; i += 4) diff += Math.abs(frame[i] - prevFrame[i]);
    diff /= (sampleW * sampleH * 255);
  }
  if (frame) prevFrame = new Uint8ClampedArray(frame);
  return Math.min(diff * 14, 1);
}

function spawnPhrase() {
  const phrase = ALL_PHRASES[Math.floor(Math.random() * ALL_PHRASES.length)];
  const chars = phrase.split('');
  const randomRow = Math.floor(Math.random() * rows);
  const randomCol = Math.floor(Math.random() * Math.max(1, cols - chars.length - 1));
  activePhrases.push({
    chars, r: randomRow, c: randomCol,
    born: Date.now(),
    life: 4500 + Math.random() * 2500,
    drift: (Math.random() - 0.5) * 0.06,
    fr: randomRow + (Math.random() - 0.5) * 18,
  });
}

function updatePhrases(motion) {
  const now = Date.now();
  activePhrases = activePhrases.filter(p => now - p.born < p.life);
  if (motion > 0.002 && activePhrases.length < 14 && Math.random() < 0.42) spawnPhrase();
  activePhrases.forEach(p => {
    p.r += (p.fr - p.r) * 0.012 + p.drift * motion * 10;
    p.r = Math.max(0, Math.min(rows - 1, p.r));
  });
}

function getRedChar(r, c) {
  for (let p of activePhrases) {
    const age = Date.now() - p.born;
    if (age / p.life > 0.95) continue;
    if (Math.round(p.r) !== r) continue;
    const ci = c - p.c;
    if (ci >= 0 && ci < p.chars.length) return p.chars[ci];
  }
  return null;
}

function draw() {
  ctx.fillStyle = 'rgba(0,0,0,0.08)';
  ctx.fillRect(0, 0, W, H);
  ctx.font = `${fontSize}px "Courier New", monospace`;

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const cell = cells[r][c];
      cell.timer -= 1;
      const bright = getPixelBrightness(r, c);
      const isBody = bright > 0.32;

      if (cell.timer <= 0) {
        cell.ch = isBody ? randBright() : randChar();
        cell.timer = isBody ? (4 + Math.random() * 10) : (10 + Math.random() * 34);
      }

      const red = getRedChar(r, c);
      if (red !== null) {
        ctx.fillStyle = '#ff2a2a';
        ctx.shadowBlur = 5;
        ctx.shadowColor = '#ff0000';
        ctx.fillText(red, c * cw, r * fontSize);
        ctx.shadowBlur = 0;
      } else if (isBody) {
        const alpha = 0.18 + bright * 0.35;
        ctx.fillStyle = `rgba(255,255,255,${alpha})`;
        ctx.shadowBlur = 2;
        ctx.shadowColor = 'rgba(255,255,255,0.5)';
        ctx.fillText(cell.ch, c * cw, r * fontSize);
        ctx.shadowBlur = 0;
      } else {
        ctx.fillStyle = `rgba(255,255,255,${0.03 + Math.random() * 0.08})`;
        ctx.fillText(cell.ch, c * cw, r * fontSize);
      }
    }
  }
}

function loop() {
  pixelData = sampleVideo();
  const raw = detectMotion(pixelData);
  motionLevel += (raw - motionLevel) * 0.18;
  updateAudioMotion(motionLevel);
  updatePhrases(motionLevel);
  draw();
  requestAnimationFrame(loop);
}

async function iniciar() {
  document.getElementById('start').style.display = 'none';

  // Init audio — must happen on user gesture
  try { initAudio(); } catch(e) {}

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
      audio: false
    });
    video.srcObject = stream;
    await video.play();
    cameraActive = true;
  } catch(e) {
    cameraActive = false;
    setInterval(() => { motionLevel = 0.05 + Math.random() * 0.3; }, 2500);
  }

  resize();
  loop();
}

window.addEventListener('resize', resize);
resize();
</script>
